- name: Sync NAS media to Raspberry Pi
  hosts: video_pis
  serial: 1
  gather_facts: false
  vars:
    target_path: /home/pi/video/
  tasks:
    - name: Validate source path exists on control machine
      ansible.builtin.stat:
        path: "{{ media_source_base_path }}/{{ media_folder }}"
      register: source_check
      delegate_to: localhost
      run_once: true

    - name: Fail if source path is missing
      ansible.builtin.fail:
        msg: >-
          Source path does not exist on control machine:
          {{ media_source_base_path }}/{{ media_folder }}
      when: not source_check.stat.exists
      delegate_to: localhost
      run_once: true

    - name: Ensure destination directory exists on Raspberry Pi
      ansible.builtin.file:
        path: "{{ target_path }}"
        state: directory
        owner: pi
        group: pi
        mode: '0755'
      changed_when: false

    - name: Sync media folder to Raspberry Pi
      ansible.posix.synchronize:
        src: "{{ media_source_base_path }}/{{ media_folder }}/"
        dest: "{{ target_path }}"
        archive: true
        recursive: true
        compress: false
        delete: true
        rsync_opts:
          - "--human-readable"
          - "--progress"
          - "--stats"
          - "--partial"
      delegate_to: localhost
      register: sync_result
      failed_when: false
      changed_when: sync_result.changed

    - name: Record sync result per host
      ansible.builtin.set_fact:
        _sync_status: "{{ (_sync_status | default({})) | combine({inventory_hostname: ('success' if sync_result.changed else 'up-to-date')}) }}"

    - name: Count source files on control machine
      ansible.builtin.shell: "find {{ media_source_base_path }}/{{ media_folder }} -type f 2>/dev/null | wc -l"
      register: source_file_count
      changed_when: false
      delegate_to: localhost

    - name: Verify destination has files after sync
      ansible.builtin.shell: "find {{ target_path }} -type f 2>/dev/null | wc -l"
      register: dest_file_count
      changed_when: false

    - name: Warn if destination is empty after sync
      ansible.builtin.debug:
        msg: >-
          WARNING: Destination {{ target_path }} has no files after sync on {{ inventory_hostname }}.
          Source had {{ source_file_count.stdout | trim }} file(s).
          Check that the source path exists and contains media files.
      when: (dest_file_count.stdout | trim | int) == 0
