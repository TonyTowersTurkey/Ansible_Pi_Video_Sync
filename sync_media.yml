- name: Sync NAS media to Raspberry Pi
  hosts: video_pis
  serial: 1
  gather_facts: true
  vars:
    target_path: /home/pi/video/
  tasks:
    - name: Ensure destination directory exists on Raspberry Pi
      file:
        path: "{{ target_path }}"
        state: directory
        owner: pi
        group: pi
        mode: '0755'

    - name: Sync NAS media folder to Raspberry Pi
      synchronize:
        src: "{{ nas_source_path }}"
        dest: "{{ target_path }}"
        archive: true
        recursive: true
        delete: false
      delegate_to: localhost
      run_once: false
